spring.application.name=inventory-service
server.port=${INVENTORY_SERVICE_PORT:8184}

spring.datasource.url=${INVENTORY_DB_URL:jdbc:h2:mem:inventory_db}
spring.datasource.username=${INVENTORY_DB_USER:sa}
spring.datasource.password=${INVENTORY_DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

app.security.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.security.jwt-secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
