spring.application.name=notificationservice
server.port=9004
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=fullstack
axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
app.frontend.login-url=${FRONTEND_LOGIN_URL:http://localhost:3000/login}
app.kafka.topics.email-verification=${EMAIL_VERIFICATION_TOPIC:email-verification}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
