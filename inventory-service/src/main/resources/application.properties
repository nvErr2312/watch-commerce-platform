spring.application.name=inventory-service
server.port=${INVENTORY_SERVICE_PORT:8184}

spring.datasource.url=${INVENTORY_DB_URL:jdbc:postgresql://localhost:5433/watch_inventory_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:11111111}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:inventory-service}
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
