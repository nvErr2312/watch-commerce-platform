spring.application.name=payment-service
server.port=${PAYMENT_SERVICE_PORT:8086}

spring.datasource.url=${PAYMENT_DB_URL:jdbc:postgresql://localhost:5433/watch_payment_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:11111111}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

app.payment.base-url=${PAYMENT_BASE_URL:http://localhost:8086/mock-payments}
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
