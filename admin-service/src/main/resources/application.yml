server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: ${APP_NAME:admin-service}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:admin-service}

app:
  security:
    jwt-secret: ${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

axon:
  axonserver:
    servers: ${AXON_SERVERS:localhost:8124}
    client-id: ${APP_NAME:admin-service}
    component-name: ${APP_NAME:admin-service}
  serializer:
    general: jackson
    messages: jackson

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      productService:
        sliding-window-size: ${CB_PRODUCT_WINDOW_SIZE:10}
        failure-rate-threshold: ${CB_PRODUCT_FAILURE_RATE:50}
        wait-duration-in-open-state: ${CB_PRODUCT_WAIT_DURATION:10s}
        permitted-number-of-calls-in-half-open-state: ${CB_PRODUCT_PERMITTED_CALLS:3}
      inventoryService:
        sliding-window-size: ${CB_INVENTORY_WINDOW_SIZE:10}
        failure-rate-threshold: ${CB_INVENTORY_FAILURE_RATE:50}
        wait-duration-in-open-state: ${CB_INVENTORY_WAIT_DURATION:10s}
        permitted-number-of-calls-in-half-open-state: ${CB_INVENTORY_PERMITTED_CALLS:3}
  timelimiter:
    instances:
      productService:
        timeout-duration: ${TL_PRODUCT_TIMEOUT:3s}
      inventoryService:
        timeout-duration: ${TL_INVENTORY_TIMEOUT:3s}