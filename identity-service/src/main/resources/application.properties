app.email-verification.ttl-minutes=${EMAIL_VERIFICATION_TTL_MINUTES:30}
app.google.client-id=${GOOGLE_CLIENT_ID:488480628324-uv5dt3j8rsf7ud80n1ok3tgek2be5t4b.apps.googleusercontent.com}

