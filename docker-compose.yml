services:
  axon-server:
    image: axoniq/axonserver
    container_name: axon-server
    ports:
      - "8024:8024"   # Axon Server dashboard (HTTP)
      - "8124:8124"   # gRPC - client connection port used by all services
    environment:
      - AXONIQ_AXONSERVER_STANDALONE=true
    volumes:
      - axon-data:/axonserver/data
      - axon-events:/axonserver/events
      - axon-log:/axonserver/log
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8024/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.4
    container_name: watch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 11111111
      MYSQL_DATABASE: watch_commerce_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p11111111"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: watch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit
    container_name: watch-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  axon-data:
  axon-events:
  axon-log:
  mysql_data:
