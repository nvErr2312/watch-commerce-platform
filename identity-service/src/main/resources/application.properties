spring.application.name=identity-service
server.port=${IDENTITY_SERVICE_PORT:8081}

spring.datasource.url=${IDENTITY_DB_URL:jdbc:h2:mem:watch_identity_db}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${IDENTITY_DB_USER:sa}
spring.datasource.password=${IDENTITY_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

app.internal-token=${INTERNAL_TOKEN:dev-internal-token}

app.identity-service.base-url=${IDENTITY_SERVICE_URL:http://localhost:8080/api/v1}
app.frontend.login-url=${FRONTEND_LOGIN_URL:http://localhost:3000/login}

