services:
  mysql:
    image: mysql:8.4
    container_name: watch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 11111111
      MYSQL_DATABASE: watch_commerce_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p11111111"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16
    container_name: watch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 11111111
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: watch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit
    container_name: watch-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  kafka:
    image: apache/kafka:3.7.0
    container_name: watch-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  axonserver:
    image: axoniq/axonserver:2024.0.4
    container_name: watch-axonserver
    hostname: watch-axonserver
    restart: unless-stopped
    ports:
      - "8124:8124"
      - "8024:8024"
    volumes:
      - axon_data:/axonserver/data
      - axon_events:/axonserver/events

  discoveryserver:
    build:
      context: ./discoveryserver
      dockerfile: Dockerfile
    container_name: watch-discoveryserver
    restart: unless-stopped
    ports:
      - "8761:8761"

volumes:
  mysql_data:
  postgres_data:
  axon_data:
  axon_events:
