spring.application.name=product-service
server.port=${PRODUCT_SERVICE_PORT:8083}

# DB_CLOSE_DELAY=-1 is load-bearing: without it H2 drops the in-memory DB once
# HikariCP recycles its last connection (maxLifetime), killing PRODUCT_VIEW
# mid-run. See NGUOI3_HANDOFF.md bug #9.
spring.datasource.url=${PRODUCT_DB_URL:jdbc:h2:mem:productDB;DB_CLOSE_DELAY=-1}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${PRODUCT_DB_USER:sa}
spring.datasource.password=${PRODUCT_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=product-service

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.axonserver.client-id=product-service
axon.axonserver.component-name=product-service
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

app.security.jwt-secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

spring.h2.console.settings.web-allow-others=true