services:
  discoveryserver:
    build:
      context: .
      dockerfile: discoveryserver/Dockerfile
    container_name: discoveryserver
    hostname: discoveryserver
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - microservice-network

  apigateway:
    build:
      context: .
      dockerfile: apigateway/Dockerfile
    container_name: apigateway
    hostname: apigateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_INSTANCE_HOSTNAME: apigateway
      EUREKA_DEFAULT_ZONE: http://discoveryserver:8761/eureka
    depends_on:
      - discoveryserver
      - redis
    networks:
      - microservice-network

  identity-service:
    build:
      context: .
      dockerfile: identity-service/Dockerfile
    container_name: identity-service
    hostname: identity-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      IDENTITY_SERVICE_PORT: 8081

      REDIS_HOST: redis
      REDIS_PORT: 6379

      AXON_SERVER_SERVERS: axonserver:8124

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GROUP_ID: identity-service
      EMAIL_VERIFICATION_TOPIC: email-verification

      EUREKA_INSTANCE_HOSTNAME: identity-service
      EUREKA_DEFAULT_ZONE: http://discoveryserver:8761/eureka

      IDENTITY_SERVICE_URL: http://localhost:8080/api/v1
      FRONTEND_LOGIN_URL: http://localhost:4200/login

      ACCESS_TOKEN_MINUTES: 5
      REFRESH_TOKEN_DAYS: 7
      EMAIL_VERIFICATION_TTL_MINUTES: 30

      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-488480628324-uv5dt3j8rsf7ud80n1ok3tgek2be5t4b.apps.googleusercontent.com}
    depends_on:
      - discoveryserver
      - redis
      - axonserver
      - kafka
    networks:
      - microservice-network

  notificationservice:
    build:
      context: .
      dockerfile: notificationservice/Dockerfile
    container_name: notificationservice
    hostname: notificationservice
    restart: unless-stopped
    ports:
      - "9004:9004"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_GROUP_ID: fullstack
      EMAIL_VERIFICATION_TOPIC: email-verification
      AXON_SERVER_SERVERS: axonserver:8124
      FRONTEND_LOGIN_URL: http://localhost:4200/login
    depends_on:
      - kafka
      - axonserver
    networks:
      - microservice-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    hostname: user-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      USER_SERVICE_PORT: 8082

      AXON_SERVER_SERVERS: axonserver:8124

      EUREKA_INSTANCE_HOSTNAME: user-service
      EUREKA_DEFAULT_ZONE: http://discoveryserver:8761/eureka

      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
      JWT_SECRET: ${JWT_SECRET:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    depends_on:
      - discoveryserver
      - axonserver
    networks:
      - microservice-network

  axonserver:
    image: axoniq/axonserver:latest
    container_name: axonserver
    hostname: axonserver
    restart: unless-stopped
    environment:
      AXONIQ_AXONSERVER_STANDALONE: "TRUE"
    ports:
      - "8024:8024"
      - "8124:8124"
      - "8224:8224"
    networks:
      - microservice-network

  redis:
    image: redis:latest
    container_name: redis
    hostname: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - microservice-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: watch-kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge

