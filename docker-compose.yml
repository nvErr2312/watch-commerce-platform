services:
  redis:
    image: redis:7.2
    container_name: watch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      
  kafka:
    image: apache/kafka:3.7.0
    container_name: watch-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  axonserver:
    image: axoniq/axonserver:2024.0.4
    container_name: watch-axonserver
    hostname: watch-axonserver
    restart: unless-stopped
    ports:
      - "8124:8124"
      - "8024:8024"
    volumes:
      - axon_data:/axonserver/data
      - axon_events:/axonserver/events

  discoveryserver:
    build:
      context: ./discoveryserver
      dockerfile: Dockerfile
    container_name: watch-discoveryserver
    restart: unless-stopped
    ports:
      - "8761:8761"

volumes:
  axon_data:
  axon_events:
