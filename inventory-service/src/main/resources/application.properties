spring.application.name=inventory-service
server.port=${INVENTORY_SERVICE_PORT:8184}

spring.datasource.url=${INVENTORY_DB_URL:jdbc:h2:file:./data/watch_inventory_db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${H2_USER:sa}
spring.datasource.password=${H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
