<main class="login-page">
  <div class="ambient-glow glow-a"></div>
  <div class="ambient-glow glow-b"></div>

  <section class="glass-panel" aria-labelledby="login-title">
    <div class="heading">
      <p class="brand">HOROLOGUE</p>
      <h1 id="login-title">Đăng nhập</h1>
    </div>

    <form [formGroup]="form" class="login-form" (ngSubmit)="submit()" novalidate>
      <label>
        <span>Email</span>
        <input formControlName="email" type="email" autocomplete="email" placeholder="Nhập email của bạn" />
      </label>

      <label>
        <span>Mật khẩu</span>
        <input formControlName="password" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" />
      </label>

      <div class="options">
        <label class="remember">
          <input formControlName="remember" type="checkbox" />
          <span>Duy trì đăng nhập</span>
        </label>
        <a href="#">Quên mật khẩu?</a>
      </div>

      @if (message()) {
        <p class="message" [class.error]="isError()">{{ message() }}</p>
      }

      <button type="submit" class="submit-button" [disabled]="form.invalid || loading()">
        {{ loading() ? 'Đang đăng nhập...' : 'Đăng nhập' }}
        <span aria-hidden="true">→</span>
      </button>
    </form>

    <div class="divider"><span></span><small>Hoặc</small><span></span></div>

    <div class="socials">
      <button type="button" class="google-button" (click)="loginWithGoogle()" [disabled]="googleLoading()">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#fbbc05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z" />
          <path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.31 9.14 5.38 12 5.38z" />
        </svg>
        {{ googleLoading() ? 'Dang mo Google...' : 'Google' }}
      </button>
    </div>

    <p class="register-link">
      Chưa có tài khoản?
      <a routerLink="/register">Đăng ký ngay</a>
    </p>
  </section>
</main>
