spring.application.name=shipping-service
server.port=${SHIPPING_SERVICE_PORT:8085}

spring.datasource.url=${SHIPPING_DB_URL:jdbc:postgresql://localhost:5433/watch_shipping_db}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:11111111}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

app.security.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.security.jwt-secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
