server:
  port: 8084

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:h2:mem:inventoryDB
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

axon:
  axonserver:
    servers: localhost:8124
    client-id: inventory-service
    component-name: inventory-service
  serializer:
    general: jackson
    events: jackson
    messages: jackson

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
