spring.application.name=identity-service
server.port=${IDENTITY_SERVICE_PORT:8081}

spring.datasource.url=${IDENTITY_MYSQL_URL:jdbc:mysql://localhost:3306/watch_identity_db?createDatabaseIfNotExist=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:11111111}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

app.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.identity-service.base-url=${IDENTITY_SERVICE_URL:http://localhost:8081}
app.frontend.login-url=${FRONTEND_LOGIN_URL:http://localhost:3000/login}
app.jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
app.jwt.access-token-minutes=${ACCESS_TOKEN_MINUTES:5}
app.jwt.refresh-token-days=${REFRESH_TOKEN_DAYS:7}
app.email-verification.ttl-minutes=${EMAIL_VERIFICATION_TTL_MINUTES:30}
