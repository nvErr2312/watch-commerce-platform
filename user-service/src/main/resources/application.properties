spring.application.name=user-service
server.port=${USER_SERVICE_PORT:8082}

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/watch_user_db?createDatabaseIfNotExist=true}
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:11111111}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

axon.axonserver.servers=${AXON_SERVER_SERVERS:localhost:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

app.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.security.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.security.jwt-secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}
