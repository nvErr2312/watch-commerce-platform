spring.application.name=user-service
server.port=${USER_SERVICE_PORT:8082}

spring.datasource.url=${USER_DB_URL:jdbc:h2:file:./data/watch_user_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${H2_USER:sa}
spring.datasource.password=${H2_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

axon.axonserver.servers=${AXON_SERVER_SERVERS:127.0.0.1:8124}
axon.serializer.general=jackson
axon.serializer.events=jackson
axon.serializer.messages=jackson

app.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.security.internal-token=${INTERNAL_TOKEN:dev-internal-token}
app.security.jwt-secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}

eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}
eureka.instance.prefer-ip-address=false
eureka.client.service-url.defaultZone=${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

app.admin.email=admin@watch.local
app.admin.username=admin
app.admin.full-name=System Admin
app.admin.user-id=1
